<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Song Lists - Aki's Living room</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="songs.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="nav-container">
            <h1 class="logo"><a href="index.html">Aki's Living room</a></h1>
            <div class="nav-right">
                <ul class="nav-list">

            </div>
        </nav>
    </header>

    <main>
        <section class="hero-container">
            <div class="hero-bg" style="background-image: url('photos/akiprofile.jpg');"></div>
            
            <div class="hero-overlay-content">
                <h2 class="hero-title">Song lists</h2>
                <p class="hero-subtitle">カラオケでリクエストしたいかもって時にお使いください</p>
                
                <div class="search-box">
                    <span class="search-icon-left">
                        <svg viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
                    </span>
                    <input type="text" placeholder="曲名やアーティスト名で検索" aria-label="Search songs">
                    <span class="search-icon-right">
                        <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                    </span>
                </div>
            </div>
        </section>

        <section class="songs-section">
            <div class="songs-wrapper">
                
                <div class="song-row">
                    <div class="song-status-icon">
                        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 14.5c-2.49 0-4.5-2.01-4.5-4.5S9.51 7.5 12 7.5s4.5 2.01 4.5 4.5-2.01 4.5-4.5 4.5zm0-5.5c-.55 0-1 .45-1 1s.45 1 1 1 1-.45 1-1-.45-1-1-1z"/></svg>
                    </div>
                    <div class="song-info">
                        <h3 class="song-title-text">Song Name</h3>
                        <p class="song-meta">Artist Name / Tags</p>
                    </div>
                </div>

                <div class="song-row">
                    <div class="song-status-icon"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 14.5c-2.49 0-4.5-2.01-4.5-4.5S9.51 7.5 12 7.5s4.5 2.01 4.5 4.5-2.01 4.5-4.5 4.5zm0-5.5c-.55 0-1 .45-1 1s.45 1 1 1 1-.45 1-1-.45-1-1-1z"/></svg></div>
                    <div class="song-info">
                        <h3 class="song-title-text">Song Name</h3>
                        <p class="song-meta">Artist Name / Tags</p>
                    </div>
                </div>

                <div class="song-row">
                    <div class="song-status-icon"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 14.5c-2.49 0-4.5-2.01-4.5-4.5S9.51 7.5 12 7.5s4.5 2.01 4.5 4.5-2.01 4.5-4.5 4.5zm0-5.5c-.55 0-1 .45-1 1s.45 1 1 1 1-.45 1-1-.45-1-1-1z"/></svg></div>
                    <div class="song-info">
                        <h3 class="song-title-text">Song Name</h3>
                        <p class="song-meta">Artist Name / Tags</p>
                    </div>
                </div>

                <div class="song-row">
                    <div class="song-status-icon"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 14.5c-2.49 0-4.5-2.01-4.5-4.5S9.51 7.5 12 7.5s4.5 2.01 4.5 4.5-2.01 4.5-4.5 4.5zm0-5.5c-.55 0-1 .45-1 1s.45 1 1 1 1-.45 1-1-.45-1-1-1z"/></svg></div>
                    <div class="song-info">
                        <h3 class="song-title-text">Song Name</h3>
                        <p class="song-meta">Artist Name / Tags</p>
                    </div>
                </div>

            </div>
        </section>
    </main>

</body>
</html>
