<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Song Lists - Aki's Living room</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="songs.css">
</head>
<body>
    <header>
        <nav class="nav-container">
            <h1><a class="logo" href="index.html">Aki's Living room</a></h1>
            <div class="nav-right">
                <ul class="nav-list">
                    <li><a href="#about-me">About me</a></li>
                    <li><a href="#sns">SNS</a></li>
                    <li><a href="#others">Others</a></li>
                </ul>
                <a href="#" class="nav-btn">≡</a>
            </div>
        </nav>
    </header>

    <main>
        <section class="hero-container">
            <div class="hero-bg"></div>
            
            <div class="hero-overlay-content">
                <h2 class="hero-title">Song lists</h2>
                <p class="hero-subtitle">カラオケでリクエストしたいかもって時にお使いください</p>
                
                <form class="search-box">
                    <button class="filter-button" type="button">
                        <img src="icons/filter-icon.png" alt="Filter Icon" class ="filter-icon">
                    </button>
                    <!-- TODO: Make it so that when we click the Filter Icon, it opens the filter options. It should be a modal window with things user can check one or more tags-->
                    <input type="text" placeholder="曲名やアーティスト名で検索" aria-label="Search songs" class="search-input">
                    <button class="search-button" type="submit">
                        <img src="icons/search-icon.png" alt="Search Icon" class="search-icon">
                    </button>
                    <!-- TODO: Implement search functionality -->
                </form>
            </div>
        </section>

        <section class="songs-section">
            <div class="songs-list">

                {{songs}}
                         
            </div>
        </section>
    </main>

</body>
</html>
